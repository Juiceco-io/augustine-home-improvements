name: Check Cognito Users (Temp)
on:
  push:
    branches:
      - nova/check-cognito-users
  workflow_dispatch:
permissions:
  id-token: write
  contents: read
jobs:
  check:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::518692945749:role/github-actions-deployer
          aws-region: us-east-1
      - name: List Cognito Users
        run: |
          echo "=== Cognito User Pool: us-east-1_2ga1APk6n ==="
          aws cognito-idp list-users \
            --user-pool-id us-east-1_2ga1APk6n \
            --output json 2>&1
