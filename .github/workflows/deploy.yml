name: Build & Deploy to AWS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  build:
    name: Build (standalone)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          SITE_URL: ${{ vars.SITE_URL || 'https://www.augustinehomeimprovements.com' }}
          NEXT_PUBLIC_APP_URL: ${{ vars.SITE_URL || 'https://www.augustinehomeimprovements.com' }}
          # Contact form posts to API Gateway + Lambda (not the local /api/contact route)
          NEXT_PUBLIC_CONTACT_API_URL: ${{ vars.CONTACT_API_URL }}
          # Cognito — admin panel OAuth
          COGNITO_DOMAIN: ${{ secrets.COGNITO_DOMAIN }}
          COGNITO_USER_POOL_ID: ${{ secrets.COGNITO_USER_POOL_ID }}
          COGNITO_APP_CLIENT_ID: ${{ secrets.COGNITO_APP_CLIENT_ID }}
          COGNITO_SUPERUSER_EMAILS: ${{ secrets.COGNITO_SUPERUSER_EMAILS }}
          ADMIN_SESSION_SECRET: ${{ secrets.ADMIN_SESSION_SECRET }}
          ISR_REVALIDATION_SECRET: ${{ secrets.ISR_REVALIDATION_SECRET }}
          NEXT_PUBLIC_GA_MEASUREMENT_ID: ${{ vars.NEXT_PUBLIC_GA_MEASUREMENT_ID }}

      - name: Upload standalone artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-standalone
          path: |
            .next/standalone/
            .next/static/
            public/
          retention-days: 1

