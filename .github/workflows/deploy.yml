name: Build & Deploy to AWS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  tf-outputs:
    name: Read Terraform Outputs
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read
    outputs:
      cloudfront_url: ${{ steps.tf.outputs.cloudfront_url }}
      cloudfront_distribution_id: ${{ steps.tf.outputs.cloudfront_distribution_id }}
      contact_api_url: ${{ steps.tf.outputs.contact_api_url }}
      cognito_user_pool_id: ${{ steps.tf.outputs.cognito_user_pool_id }}
      cognito_app_client_id: ${{ steps.tf.outputs.cognito_app_client_id }}
      cognito_domain: ${{ steps.tf.outputs.cognito_domain }}
      ecr_repository_url: ${{ steps.tf.outputs.ecr_repository_url }}
      ecs_cluster_name: ${{ steps.tf.outputs.ecs_cluster_name }}
      ecs_service_name: ${{ steps.tf.outputs.ecs_service_name }}
      github_actions_role_arn: ${{ steps.tf.outputs.github_actions_role_arn }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}
        continue-on-error: true
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"
      - name: Terraform init
        run: terraform -chdir=infra/terraform init -input=false
        continue-on-error: true
      - name: Export Terraform outputs
        id: tf
        run: bash infra/scripts/export-tf-outputs.sh
        continue-on-error: true

  build:
    name: Build (standalone)
    runs-on: ubuntu-latest
    needs: tf-outputs
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npx tsc --noEmit
      - name: Build
        run: npm run build
        env:
          SITE_URL: ${{ needs.tf-outputs.outputs.cloudfront_url || vars.SITE_URL || '' }}
          NEXT_PUBLIC_APP_URL: ${{ needs.tf-outputs.outputs.cloudfront_url || vars.SITE_URL || '' }}
          NEXT_PUBLIC_CONTACT_API_URL: ${{ needs.tf-outputs.outputs.contact_api_url || vars.CONTACT_API_URL || '' }}
          COGNITO_USER_POOL_ID: ${{ needs.tf-outputs.outputs.cognito_user_pool_id || vars.COGNITO_USER_POOL_ID || '' }}
          COGNITO_APP_CLIENT_ID: ${{ needs.tf-outputs.outputs.cognito_app_client_id || vars.COGNITO_APP_CLIENT_ID || '' }}
          COGNITO_DOMAIN: ${{ needs.tf-outputs.outputs.cognito_domain || vars.COGNITO_DOMAIN || '' }}
          COGNITO_SUPERUSER_EMAILS: ${{ secrets.COGNITO_SUPERUSER_EMAILS || '' }}
          ADMIN_SESSION_SECRET: ${{ secrets.ADMIN_SESSION_SECRET }}
          ISR_REVALIDATION_SECRET: ${{ secrets.ISR_REVALIDATION_SECRET }}
          NEXT_PUBLIC_GA_MEASUREMENT_ID: ${{ vars.NEXT_PUBLIC_GA_MEASUREMENT_ID || '' }}
      - name: Prepare standalone artifact
        run: |
          cp -r public .next/standalone/public
          cp -r .next/static .next/standalone/.next/static
      - name: Upload standalone artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-standalone
          path: |
            .next/standalone/
          retention-days: 1

  deploy-ecs:
    name: Deploy to AWS ECS
    # PREREQUISITE: Run `terraform apply` in infra/terraform first.
    # Also create SSM parameters before first deploy:
    #   aws ssm put-parameter --name /augustine/production/admin-session-secret \
    #     --value "<random-32-char>" --type SecureString
    #   aws ssm put-parameter --name /augustine/production/isr-revalidation-secret \
    #     --value "<random-token>" --type SecureString
    needs: [tf-outputs, build]
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ needs.tf-outputs.outputs.github_actions_role_arn || secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: nextjs-standalone
          path: .next/standalone/
      - name: Restore static and public for Docker build
        run: |
          # Artifact already contains standalone + static + public from build job
          mkdir -p .next/static public
          # Copy from standalone back to expected paths for Dockerfile
          cp -r .next/standalone/.next/static .next/static || true
          cp -r .next/standalone/public public || true
      - name: Build and push Docker image
        env:
          ECR_REPO: ${{ needs.tf-outputs.outputs.ecr_repository_url }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="${ECR_REPO}:${IMAGE_TAG}"
          IMAGE_LATEST="${ECR_REPO}:latest"
          docker build -t "$IMAGE_URI" -t "$IMAGE_LATEST" .
          docker push "$IMAGE_URI"
          docker push "$IMAGE_LATEST"
          echo "IMAGE_URI=$IMAGE_URI" >> "$GITHUB_ENV"
      - name: Deploy to ECS (force new deployment)
        run: |
          aws ecs update-service \
            --cluster "${{ needs.tf-outputs.outputs.ecs_cluster_name }}" \
            --service "${{ needs.tf-outputs.outputs.ecs_service_name }}" \
            --force-new-deployment \
            --no-cli-pager
      - name: Wait for ECS deployment to stabilize
        run: |
          aws ecs wait services-stable \
            --cluster "${{ needs.tf-outputs.outputs.ecs_cluster_name }}" \
            --services "${{ needs.tf-outputs.outputs.ecs_service_name }}"

  invalidate-cdn:
    name: Invalidate CloudFront Cache
    needs: [tf-outputs, deploy-ecs]
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ needs.tf-outputs.outputs.github_actions_role_arn || secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}
      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ needs.tf-outputs.outputs.cloudfront_distribution_id }}" \
            --paths "/*" \
            --no-cli-pager
