name: Deploy

on:
  push:
    branches: [dev, qa, main]

# Minimal permissions — only what each job needs
permissions:
  id-token: write   # Required for OIDC token
  contents: read

env:
  AWS_REGION: us-east-1
  TF_DIR: infrastructure

jobs:
  # ─────────────────────────────────────────────
  # Job 0: Resolve GitHub Environment name + AWS config
  # ─────────────────────────────────────────────
  set-environment:
    name: Set Environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
      account_id: ${{ steps.aws-config.outputs.account_id }}
      deployer_role: ${{ steps.aws-config.outputs.deployer_role }}
      state_role: ${{ steps.aws-config.outputs.state_role }}
      cloudfront_aliases_json: ${{ steps.aws-config.outputs.cloudfront_aliases_json }}
    steps:
      - id: set-env
        name: Map branch → environment
        run: |
          case "${{ github.ref_name }}" in
            dev)  echo "environment=dev"  >> $GITHUB_OUTPUT ;;
            qa)   echo "environment=qa"   >> $GITHUB_OUTPUT ;;
            main) echo "environment=prod" >> $GITHUB_OUTPUT ;;
            *)
              echo "Unknown branch: ${{ github.ref_name }}" >&2
              exit 1
              ;;
          esac

      - name: Set AWS config
        id: aws-config
        run: |
          case "${{ github.ref_name }}" in
            dev|qa)
              echo "account_id=518692945749" >> $GITHUB_OUTPUT
              echo "deployer_role=arn:aws:iam::518692945749:role/github-actions-deployer" >> $GITHUB_OUTPUT
              echo 'cloudfront_aliases_json=[]' >> $GITHUB_OUTPUT
              ;;
            main)
              # TODO: fill in prod account ID and aliases when ready
              echo "account_id=PROD_ACCOUNT_ID_PLACEHOLDER" >> $GITHUB_OUTPUT
              echo "deployer_role=arn:aws:iam::PROD_ACCOUNT_ID_PLACEHOLDER:role/github-actions-deployer" >> $GITHUB_OUTPUT
              echo 'cloudfront_aliases_json=["www.augustinehomeimprovements.com","augustinehomeimprovements.com"]' >> $GITHUB_OUTPUT
              ;;
          esac
          # Match company-homepage: Terraform state role lives in the management account
          echo "state_role=arn:aws:iam::389813258758:role/github-actions-terraform-state" >> $GITHUB_OUTPUT

  # ─────────────────────────────────────────────
  # Job 1: Provision infrastructure with Terraform
  # ─────────────────────────────────────────────
  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: set-environment
    environment: ${{ needs.set-environment.outputs.environment }}
    outputs:
      cloudfront_distribution_id: ${{ steps.tf-output.outputs.cloudfront_distribution_id }}
      s3_bucket_name: ${{ steps.tf-output.outputs.s3_bucket_name }}
      cloudfront_domain_name: ${{ steps.tf-output.outputs.cloudfront_domain_name }}
      cms_cognito_user_pool_id: ${{ steps.tf-output.outputs.cms_cognito_user_pool_id }}
      cms_cognito_client_id: ${{ steps.tf-output.outputs.cms_cognito_client_id }}
      cms_api_url: ${{ steps.tf-output.outputs.cms_api_url }}
      contact_api_url: ${{ steps.tf-output.outputs.contact_api_url }}
      analytics_api_ingest_url: ${{ steps.tf-output.outputs.analytics_api_ingest_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Configure AWS credentials (Terraform state)
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502
        with:
          role-to-assume: ${{ needs.set-environment.outputs.state_role }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd
        with:
          terraform_version: "~1.7"
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init \
            -backend-config="key=augustine-home-improvements/${{ needs.set-environment.outputs.environment }}/terraform.tfstate"

      - name: Terraform Plan
        working-directory: ${{ env.TF_DIR }}
        env:
          # --- Admin user bootstrap ---
          # ADMIN_EMAIL  : GitHub Actions *variable* (Settings → Environments → Variables)
          #                ⚠️ Must be a VARIABLE not a secret — ${{ vars.ADMIN_EMAIL }}
          #                   If set as a secret, ${{ vars.ADMIN_EMAIL }} returns ""
          #                   and the Cognito user is never created.
          # ADMIN_PASSWORD: GitHub Actions *secret*  (Settings → Environments → Secrets)
          #
          # [DEV BOOTSTRAP ONLY] Terraform creates the Cognito user when ADMIN_EMAIL is set.
          # The password is set by an explicit post-apply step (see below) that re-assumes
          # the deployer role so it has cognito-idp permissions on the dev account.
          TF_VAR_admin_email: ${{ vars.ADMIN_EMAIL }}
          # CONTACT_TO_EMAIL: GitHub Actions variable (Settings → Environments → Variables)
          # Must be a verified SES address while the account is in SES sandbox mode.
          TF_VAR_contact_to_email: ${{ vars.CONTACT_TO_EMAIL }}
          # GitHub uppercases all variable names, so we cannot store TF_VAR_ses_email_enabled
          # directly. Instead we store SES_EMAIL_ENABLED and map it here with the correct
          # lowercase suffix that Terraform requires for env-var variable injection.
          TF_VAR_ses_email_enabled: ${{ vars.SES_EMAIL_ENABLED }}
        run: |
          terraform plan \
            -var="environment=${{ needs.set-environment.outputs.environment }}" \
            -var="deployer_role_arn=${{ needs.set-environment.outputs.deployer_role }}" \
            -var='cloudfront_aliases=${{ needs.set-environment.outputs.cloudfront_aliases_json }}' \
            -out=tfplan

      - name: Terraform Apply
        working-directory: ${{ env.TF_DIR }}
        env:
          TF_VAR_admin_email: ${{ vars.ADMIN_EMAIL }}
          TF_VAR_contact_to_email: ${{ vars.CONTACT_TO_EMAIL }}
          TF_VAR_ses_email_enabled: ${{ vars.SES_EMAIL_ENABLED }}
          # ADMIN_PASSWORD is only used by the explicit post-apply step below.
          # No longer passed to Terraform (null_resource local-exec was removed
          # because it ran under the state-role which has no Cognito permissions).
        run: terraform apply -auto-approve tfplan

      # ── [DEV BOOTSTRAP ONLY] Set permanent Cognito password ───────────────
      # Runs AFTER Terraform apply under the deployer role (which has
      # cognito-idp:AdminSetUserPassword on the dev account).  The state role
      # used during terraform init/apply does NOT have Cognito permissions,
      # which is why the previous null_resource local-exec silently failed.
      #
      # Prerequisites (GitHub Actions dev environment):
      #   ADMIN_EMAIL    → Settings → Environments → dev → Variables
      #   ADMIN_PASSWORD → Settings → Environments → dev → Secrets
      #
      # Skip when ADMIN_EMAIL is empty or ADMIN_PASSWORD is not set.
      - name: Bootstrap admin Cognito password
        # Only run when ADMIN_EMAIL variable is set. ADMIN_PASSWORD secret is
        # referenced in the env block below; GitHub Actions will substitute an
        # empty string if the secret is not defined (step is a no-op in that case).
        if: ${{ vars.ADMIN_EMAIL != '' }}
        working-directory: ${{ env.TF_DIR }}
        env:
          DEPLOYER_ROLE: ${{ needs.set-environment.outputs.deployer_role }}
          ADMIN_EMAIL: ${{ vars.ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          if [ -z "$ADMIN_PASSWORD" ]; then
            echo "::warning title=Admin Bootstrap::ADMIN_PASSWORD secret is not set — skipping password bootstrap."
            exit 0
          fi

          # Pre-validate password against Cognito policy (min 12 chars, upper, lower, digit, symbol)
          # to surface a clear error before making the API call.
          PW_OK=true
          [ ${#ADMIN_PASSWORD} -lt 12 ] && { echo "::error title=Admin Bootstrap::ADMIN_PASSWORD must be at least 12 characters."; PW_OK=false; }
          echo "$ADMIN_PASSWORD" | grep -q '[A-Z]' || { echo "::error title=Admin Bootstrap::ADMIN_PASSWORD must contain at least one uppercase letter."; PW_OK=false; }
          echo "$ADMIN_PASSWORD" | grep -q '[a-z]' || { echo "::error title=Admin Bootstrap::ADMIN_PASSWORD must contain at least one lowercase letter."; PW_OK=false; }
          echo "$ADMIN_PASSWORD" | grep -q '[0-9]' || { echo "::error title=Admin Bootstrap::ADMIN_PASSWORD must contain at least one number."; PW_OK=false; }
          echo "$ADMIN_PASSWORD" | grep -qP '[^A-Za-z0-9]' || { echo "::error title=Admin Bootstrap::ADMIN_PASSWORD must contain at least one symbol."; PW_OK=false; }
          if [ "$PW_OK" = "false" ]; then
            echo "::error title=Admin Bootstrap::Update the ADMIN_PASSWORD secret in Settings → Environments → dev → Secrets."
            exit 1
          fi

          POOL_ID=$(terraform output -raw cms_cognito_user_pool_id)

          # Re-assume the deployer role so we have Cognito permissions on the
          # dev account (current creds are the state role in the mgmt account).
          CREDS=$(aws sts assume-role \
            --role-arn "$DEPLOYER_ROLE" \
            --role-session-name "admin-bootstrap" \
            --query 'Credentials.[AccessKeyId,SecretAccessKey,SessionToken]' \
            --output text)
          export AWS_ACCESS_KEY_ID=$(echo "$CREDS" | awk '{print $1}')
          export AWS_SECRET_ACCESS_KEY=$(echo "$CREDS" | awk '{print $2}')
          export AWS_SESSION_TOKEN=$(echo "$CREDS" | awk '{print $3}')

          echo "[bootstrap] Setting permanent password for $ADMIN_EMAIL ..."
          aws cognito-idp admin-set-user-password \
            --region us-east-1 \
            --user-pool-id "$POOL_ID" \
            --username "$ADMIN_EMAIL" \
            --password "$ADMIN_PASSWORD" \
            --permanent
          echo "::notice title=Admin Bootstrap::Permanent password set for $ADMIN_EMAIL — ready to log in."

      # ── Seed initial site-config.json into S3 ─────────────────────────────
      # The cms-config Lambda's GET /config reads config/site-config.json from
      # the config bucket. If the object doesn't exist the Lambda returns 404,
      # but ONLY if the IAM role has s3:ListBucket (otherwise S3 returns
      # AccessDenied which the Lambda maps to 500). This step seeds the default
      # config on first deploy so GET /config works immediately after standing
      # up the stack. It is idempotent — it skips the upload when the object
      # already exists (preserving any admin edits).
      - name: Seed initial site-config.json into S3
        working-directory: ${{ env.TF_DIR }}
        env:
          DEPLOYER_ROLE: ${{ needs.set-environment.outputs.deployer_role }}
        run: |
          CONFIG_BUCKET=$(terraform output -raw cms_config_bucket)

          # Re-assume the deployer role (current creds = state role in mgmt account)
          CREDS=$(aws sts assume-role \
            --role-arn "$DEPLOYER_ROLE" \
            --role-session-name "config-seed" \
            --query 'Credentials.[AccessKeyId,SecretAccessKey,SessionToken]' \
            --output text)
          export AWS_ACCESS_KEY_ID=$(echo "$CREDS" | awk '{print $1}')
          export AWS_SECRET_ACCESS_KEY=$(echo "$CREDS" | awk '{print $2}')
          export AWS_SESSION_TOKEN=$(echo "$CREDS" | awk '{print $3}')

          # Only seed if the object does not already exist (preserve admin edits)
          HTTP_STATUS=$(aws s3api head-object \
            --bucket "$CONFIG_BUCKET" \
            --key "config/site-config.json" \
            --query 'ContentLength' \
            --output text 2>/dev/null && echo "exists" || echo "missing")

          if [ "$HTTP_STATUS" = "missing" ]; then
            echo "[config-seed] config/site-config.json not found — uploading default config..."
            aws s3 cp ../cms/config/site-config.json \
              "s3://$CONFIG_BUCKET/config/site-config.json" \
              --content-type application/json
            echo "::notice title=Config Seed::Default site-config.json seeded into $CONFIG_BUCKET"
          else
            echo "[config-seed] config/site-config.json already exists — skipping seed (preserving admin edits)."
          fi

      # ── Migrate serviceAreas into existing CMS config ────────────────────
      # One-time: patches serviceAreas from public/site-config.json into the
      # S3 CMS config if the field is missing or empty. No-op on all
      # subsequent deploys once the CMS has towns populated.
      - name: Migrate serviceAreas into CMS config
        working-directory: ${{ env.TF_DIR }}
        env:
          DEPLOYER_ROLE: ${{ needs.set-environment.outputs.deployer_role }}
        run: |
          CONFIG_BUCKET=$(terraform output -raw cms_config_bucket)

          CREDS=$(aws sts assume-role \
            --role-arn "$DEPLOYER_ROLE" \
            --role-session-name "service-areas-migrate" \
            --query 'Credentials.[AccessKeyId,SecretAccessKey,SessionToken]' \
            --output text)
          export AWS_ACCESS_KEY_ID=$(echo "$CREDS" | awk '{print $1}')
          export AWS_SECRET_ACCESS_KEY=$(echo "$CREDS" | awk '{print $2}')
          export AWS_SESSION_TOKEN=$(echo "$CREDS" | awk '{print $3}')

          aws s3 cp "s3://$CONFIG_BUCKET/config/site-config.json" /tmp/cms-config.json 2>/dev/null || echo '{}' > /tmp/cms-config.json

          node -e "
            const fs = require('fs');
            const cms = JSON.parse(fs.readFileSync('/tmp/cms-config.json', 'utf-8'));
            const repo = JSON.parse(fs.readFileSync('../public/site-config.json', 'utf-8'));
            if (!cms.serviceAreas || !cms.serviceAreas.length) {
              cms.serviceAreas = repo.serviceAreas || [];
              fs.writeFileSync('/tmp/cms-config-patched.json', JSON.stringify(cms, null, 2));
              const total = cms.serviceAreas.reduce((s, c) => s + c.towns.length, 0);
              console.log('Patching serviceAreas: ' + cms.serviceAreas.length + ' counties, ' + total + ' towns');
              process.exit(0);
            }
            console.log('serviceAreas already present — skipping migration');
            process.exit(1);
          " && aws s3 cp /tmp/cms-config-patched.json \
              "s3://$CONFIG_BUCKET/config/site-config.json" \
              --content-type application/json \
            && echo "::notice title=Service Areas::Migrated serviceAreas into CMS config" \
            || echo "[service-areas-migrate] No migration needed."

      - name: Check SES domain verification status
        working-directory: ${{ env.TF_DIR }}
        run: |
          SES_DOMAIN=$(terraform output -raw ses_domain 2>/dev/null || echo "augustinehomeimprovements.com")
          STATUS=$(aws sesv2 get-email-identity --email-identity "$SES_DOMAIN" --query 'VerifiedForSendingStatus' --output text 2>/dev/null || echo "UNKNOWN")
          if [ "$STATUS" = "True" ]; then
            echo "::notice title=SES::Domain $SES_DOMAIN is verified — Cognito will use SES for transactional email."
          else
            echo "::warning title=SES not verified::Domain $SES_DOMAIN is NOT yet verified in SES. Forgot-password emails will NOT work until you:"
            echo "::warning title=SES not verified::  1. Run: cd infrastructure && terraform output ses_domain_verification_record"
            echo "::warning title=SES not verified::  2. Run: cd infrastructure && terraform output ses_dkim_cname_records"
            echo "::warning title=SES not verified::  3. Add the TXT + 3 CNAME records to your DNS registrar"
            echo "::warning title=SES not verified::  4. Wait ~5-30 min for DNS propagation"
            echo "::warning title=SES not verified::  5. Re-run this deploy pipeline"
          fi

      - name: Get Terraform Outputs
        id: tf-output
        working-directory: ${{ env.TF_DIR }}
        run: |
          CF_ID=$(terraform output -raw cloudfront_distribution_id)
          BUCKET=$(terraform output -raw s3_bucket_name)
          CF_DOMAIN=$(terraform output -raw cloudfront_domain_name)
          POOL_ID=$(terraform output -raw cms_cognito_user_pool_id)
          CLIENT_ID=$(terraform output -raw cms_cognito_client_id)
          API_URL=$(terraform output -raw cms_api_url)
          CONTACT_API_URL=$(terraform output -raw contact_api_url)
          ANALYTICS_API_URL=$(terraform output -raw analytics_api_ingest_url)
          ADMIN_SEEDED=$(terraform output -raw cms_admin_user_created)
          echo "cloudfront_distribution_id=$CF_ID" >> "$GITHUB_OUTPUT"
          echo "s3_bucket_name=$BUCKET" >> "$GITHUB_OUTPUT"
          echo "cloudfront_domain_name=$CF_DOMAIN" >> "$GITHUB_OUTPUT"
          echo "cms_cognito_user_pool_id=$POOL_ID" >> "$GITHUB_OUTPUT"
          echo "cms_cognito_client_id=$CLIENT_ID" >> "$GITHUB_OUTPUT"
          echo "cms_api_url=$API_URL" >> "$GITHUB_OUTPUT"
          echo "contact_api_url=$CONTACT_API_URL" >> "$GITHUB_OUTPUT"
          echo "analytics_api_ingest_url=$ANALYTICS_API_URL" >> "$GITHUB_OUTPUT"
          echo "::notice title=CloudFront URL::$CF_DOMAIN"
          echo "::notice title=CMS API URL::$API_URL"
          echo "::notice title=Contact API URL::$CONTACT_API_URL"
          echo "::notice title=Analytics Ingest URL::$ANALYTICS_API_URL"
          if [ "$ADMIN_SEEDED" = "true" ]; then
            echo "::notice title=Admin User::Cognito admin user seeded. Set password with: aws cognito-idp admin-set-user-password --user-pool-id $POOL_ID --username <email> --password '<PASSWORD>' --permanent"
          fi

  # ─────────────────────────────────────────────
  # Job 2: Build Next.js and deploy to S3
  # ─────────────────────────────────────────────
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: [set-environment, terraform-apply]
    environment: ${{ needs.set-environment.outputs.environment }}
    env:
      CF_DISTRIBUTION_ID: ${{ needs.terraform-apply.outputs.cloudfront_distribution_id }}
      S3_BUCKET: ${{ needs.terraform-apply.outputs.s3_bucket_name }}
      IAM_ROLE: ${{ needs.set-environment.outputs.deployer_role }}
      NEXT_PUBLIC_APP_VERSION: ${{ github.sha }}
      NEXT_PUBLIC_COGNITO_USER_POOL_ID: ${{ needs.terraform-apply.outputs.cms_cognito_user_pool_id }}
      NEXT_PUBLIC_COGNITO_CLIENT_ID: ${{ needs.terraform-apply.outputs.cms_cognito_client_id }}
      NEXT_PUBLIC_CMS_API_URL: ${{ needs.terraform-apply.outputs.cms_api_url }}
      NEXT_PUBLIC_CMS_CONFIG_URL: ${{ needs.terraform-apply.outputs.cms_config_url }}
      NEXT_PUBLIC_SITE_URL: ${{ needs.terraform-apply.outputs.cloudfront_domain_name }}
      NEXT_PUBLIC_CONTACT_API_URL: ${{ needs.terraform-apply.outputs.contact_api_url }}
      NEXT_PUBLIC_ANALYTICS_API_URL: ${{ needs.terraform-apply.outputs.analytics_api_ingest_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Node.js 20
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Fetch live site-config.json for build
        run: |
          SITE_URL="https://${{ needs.terraform-apply.outputs.cloudfront_domain_name }}"
          if curl -sf "$SITE_URL/site-config.json" -o public/site-config.json; then
            echo "Fetched live site-config.json from $SITE_URL"
          else
            echo "::warning::Could not fetch live site-config.json — using repo fallback"
          fi

      - name: Build static export
        run: npm run build

      - name: Configure AWS credentials (Deploy)
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502
        with:
          role-to-assume: ${{ env.IAM_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync HTML and manifests to S3 (no-cache, upload first)
        run: |
          aws s3 sync ./out s3://${{ env.S3_BUCKET }} \
            --cache-control "public, max-age=0, must-revalidate" \
            --exclude "*" \
            --include "*.html" \
            --include "*.json" \
            --include "*.txt" \
            --include "*.xml"

      - name: Sync static assets to S3 (immutable cache, then delete stale)
        run: |
          aws s3 sync ./out s3://${{ env.S3_BUCKET }} \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html" \
            --exclude "*.json" \
            --exclude "*.txt" \
            --exclude "*.xml"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CF_DISTRIBUTION_ID }} \
            --paths "/*"

      - name: Print deployment URL
        run: |
          echo "✅ Deployed to: ${{ needs.terraform-apply.outputs.cloudfront_domain_name }}"
