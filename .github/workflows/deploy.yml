name: Deploy

# Mirrors the company-homepage deploy pattern: Terraform → S3 static export → CloudFront invalidation.
# Admin panel (ECS/Cognito) is deferred; the Next.js site is a fully static export.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write   # Required for OIDC token
  contents: read

env:
  AWS_REGION: us-east-1
  TF_DIR: infrastructure

jobs:
  # ─────────────────────────────────────────────
  # Job 0: Provision infrastructure with Terraform
  # ─────────────────────────────────────────────
  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    environment: production
    outputs:
      cloudfront_distribution_id: ${{ steps.tf-output.outputs.cloudfront_distribution_id }}
      s3_bucket_name: ${{ steps.tf-output.outputs.s3_bucket_name }}
      cloudfront_domain_name: ${{ steps.tf-output.outputs.cloudfront_domain_name }}
      contact_api_url: ${{ steps.tf-output.outputs.contact_api_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Configure AWS credentials (Terraform state)
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502
        with:
          role-to-assume: ${{ vars.TF_STATE_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd
        with:
          terraform_version: "~1.7"
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init \
            -backend-config="key=augustine-home-improvements/production/terraform.tfstate"

      - name: Terraform Plan
        working-directory: ${{ env.TF_DIR }}
        env:
          TF_VAR_contact_from_email: ${{ vars.CONTACT_FROM_EMAIL }}
          TF_VAR_contact_to_email: ${{ vars.CONTACT_TO_EMAIL }}
          TF_VAR_contact_email_domain: ${{ vars.CONTACT_EMAIL_DOMAIN }}
        run: |
          terraform plan \
            -var="environment=production" \
            -var="deployer_role_arn=${{ vars.DEPLOYER_ROLE_ARN }}" \
            -var='cloudfront_aliases=${{ vars.CLOUDFRONT_ALIASES_JSON || "[]" }}' \
            -out=tfplan

      - name: Terraform Apply
        working-directory: ${{ env.TF_DIR }}
        run: terraform apply -auto-approve tfplan

      - name: Get Terraform Outputs
        id: tf-output
        working-directory: ${{ env.TF_DIR }}
        run: |
          echo "cloudfront_distribution_id=$(terraform output -raw cloudfront_distribution_id)" >> "$GITHUB_OUTPUT"
          echo "s3_bucket_name=$(terraform output -raw s3_bucket_name)" >> "$GITHUB_OUTPUT"
          echo "cloudfront_domain_name=$(terraform output -raw cloudfront_domain_name)" >> "$GITHUB_OUTPUT"
          echo "contact_api_url=$(terraform output -raw contact_api_url)" >> "$GITHUB_OUTPUT"
          echo "::notice title=CloudFront URL::$(terraform output -raw cloudfront_domain_name)"

  # ─────────────────────────────────────────────
  # Job 1: Build static export and deploy to S3
  # ─────────────────────────────────────────────
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: [terraform-apply]
    environment: production
    env:
      CF_DISTRIBUTION_ID: ${{ needs.terraform-apply.outputs.cloudfront_distribution_id }}
      S3_BUCKET: ${{ needs.terraform-apply.outputs.s3_bucket_name }}
      NEXT_PUBLIC_CONTACT_API_URL: ${{ needs.terraform-apply.outputs.contact_api_url }}
      NEXT_PUBLIC_GA_MEASUREMENT_ID: ${{ vars.NEXT_PUBLIC_GA_MEASUREMENT_ID }}
      NEXT_PUBLIC_APP_VERSION: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Node.js 20
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Build static export
        run: npm run build

      - name: Configure AWS credentials (Deploy)
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502
        with:
          role-to-assume: ${{ vars.DEPLOYER_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync static assets to S3 (long-lived cache)
        run: |
          aws s3 sync ./out s3://${{ env.S3_BUCKET }} \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html" \
            --exclude "*.json" \
            --exclude "*.txt" \
            --exclude "*.xml"

      - name: Sync HTML, JSON, sitemaps (short-lived cache)
        run: |
          aws s3 sync ./out s3://${{ env.S3_BUCKET }} \
            --cache-control "public, max-age=0, must-revalidate" \
            --include "*.html" \
            --include "*.json" \
            --include "*.txt" \
            --include "*.xml"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CF_DISTRIBUTION_ID }} \
            --paths "/*"

      - name: Print deployment URL
        run: |
          echo "✅ Deployed to: ${{ needs.terraform-apply.outputs.cloudfront_domain_name }}"
