name: Destroy Augustine Infrastructure

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  TF_DIR: infrastructure

jobs:
  destroy:
    name: Destroy infrastructure
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.DEPLOYER_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init \
            -backend-config="key=augustine-home-improvements/dev/terraform.tfstate"

      - name: Terraform Destroy
        working-directory: ${{ env.TF_DIR }}
        env:
          TF_VAR_contact_from_email: ${{ vars.CONTACT_FROM_EMAIL }}
          TF_VAR_contact_to_email: ${{ vars.CONTACT_TO_EMAIL }}
          TF_VAR_contact_email_domain: ${{ vars.CONTACT_EMAIL_DOMAIN }}
        run: |
          terraform destroy -auto-approve \
            -var="environment=dev" \
            -var="deployer_role_arn=${{ vars.DEPLOYER_ROLE_ARN }}" \
            -var='cloudfront_aliases=[]'
