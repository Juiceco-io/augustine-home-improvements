name: Preview Build (PR Check)

on:
  pull_request:
    branches: [main]

jobs:
  check:
    name: Type Check & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build (preview mode)
        run: npm run build
        env:
          SITE_URL: https://preview.augustinehomeimprovements.com
          # Use placeholder values for preview builds
          SES_FROM_EMAIL: noreply@example.com
          CONTACT_RECIPIENT_EMAIL: dev@example.com
          AWS_REGION: us-east-1
          ADMIN_JWT_SECRET: preview-secret-not-for-production-use
          ISR_REVALIDATION_SECRET: preview-revalidation-secret
