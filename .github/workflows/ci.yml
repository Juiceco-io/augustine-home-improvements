name: CI

on:
  push:
    branches:
      - main
      - static-export-deploy
  pull_request:
    branches:
      - main

jobs:
  ci:
    name: Lint, Typecheck & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build static export
        run: npm run build
        env:
          # Contact form API URL is optional at build time; the form gracefully
          # handles the missing env var (falls back to informational message).
          NEXT_PUBLIC_CONTACT_API_URL: ''
          NEXT_PUBLIC_GA_MEASUREMENT_ID: ''
