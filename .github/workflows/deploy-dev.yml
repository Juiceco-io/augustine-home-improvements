name: Deploy (dev)

on:
  push:
    branches: [dev]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  TF_DIR: infrastructure

jobs:
  set-environment:
    name: Set Environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
      deployer_role: ${{ steps.aws-config.outputs.deployer_role }}
      state_role: ${{ steps.aws-config.outputs.state_role }}
      cloudfront_aliases_json: ${{ steps.aws-config.outputs.cloudfront_aliases_json }}
    steps:
      - id: set-env
        run: echo "environment=dev" >> $GITHUB_OUTPUT
      - id: aws-config
        run: |
          echo "deployer_role=${{ vars.DEPLOYER_ROLE_ARN }}" >> $GITHUB_OUTPUT
          echo "state_role=${{ vars.TF_STATE_ROLE_ARN }}" >> $GITHUB_OUTPUT
          echo 'cloudfront_aliases_json=[]' >> $GITHUB_OUTPUT

  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: set-environment
    environment: dev
    outputs:
      cloudfront_distribution_id: ${{ steps.tf-output.outputs.cloudfront_distribution_id }}
      s3_bucket_name: ${{ steps.tf-output.outputs.s3_bucket_name }}
      cloudfront_domain_name: ${{ steps.tf-output.outputs.cloudfront_domain_name }}
      contact_api_url: ${{ steps.tf-output.outputs.contact_api_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure AWS credentials (Terraform state)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ needs.set-environment.outputs.state_role }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"
          terraform_wrapper: false
      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init \
            -backend-config="key=augustine-home-improvements/dev/terraform.tfstate"
      - name: Terraform Plan
        working-directory: ${{ env.TF_DIR }}
        env:
          TF_VAR_contact_from_email: ${{ vars.CONTACT_FROM_EMAIL }}
          TF_VAR_contact_to_email: ${{ vars.CONTACT_TO_EMAIL }}
          TF_VAR_contact_email_domain: ${{ vars.CONTACT_EMAIL_DOMAIN }}
        run: |
          terraform plan \
            -var="environment=dev" \
            -var="deployer_role_arn=${{ needs.set-environment.outputs.deployer_role }}" \
            -var='cloudfront_aliases=${{ needs.set-environment.outputs.cloudfront_aliases_json }}' \
            -out=tfplan
      - name: Terraform Apply
        working-directory: ${{ env.TF_DIR }}
        run: terraform apply -auto-approve tfplan
      - name: Get Terraform Outputs
        id: tf-output
        working-directory: ${{ env.TF_DIR }}
        run: |
          echo "cloudfront_distribution_id=$(terraform output -raw cloudfront_distribution_id)" >> "$GITHUB_OUTPUT"
          echo "s3_bucket_name=$(terraform output -raw s3_bucket_name)" >> "$GITHUB_OUTPUT"
          echo "cloudfront_domain_name=$(terraform output -raw cloudfront_domain_name)" >> "$GITHUB_OUTPUT"
          echo "contact_api_url=$(terraform output -raw contact_api_url)" >> "$GITHUB_OUTPUT"
          echo "::notice title=CloudFront URL::$(terraform output -raw cloudfront_domain_name)"

  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: [set-environment, terraform-apply]
    environment: dev
    env:
      CF_DISTRIBUTION_ID: ${{ needs.terraform-apply.outputs.cloudfront_distribution_id }}
      S3_BUCKET: ${{ needs.terraform-apply.outputs.s3_bucket_name }}
      NEXT_PUBLIC_CONTACT_API_URL: ${{ needs.terraform-apply.outputs.contact_api_url }}
      NEXT_PUBLIC_APP_URL: https://${{ needs.terraform-apply.outputs.cloudfront_domain_name }}
      NEXT_PUBLIC_GA_MEASUREMENT_ID: ${{ vars.NEXT_PUBLIC_GA_MEASUREMENT_ID }}
      NEXT_PUBLIC_APP_VERSION: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build static export
        run: npm run build
      - name: Configure AWS credentials (Deploy)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ needs.set-environment.outputs.deployer_role }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Sync static assets to S3
        run: |
          aws s3 sync ./out s3://${{ env.S3_BUCKET }} \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html" \
            --exclude "*.json" \
            --exclude "*.txt" \
            --exclude "*.xml"
      - name: Sync HTML and manifests to S3
        run: |
          aws s3 sync ./out s3://${{ env.S3_BUCKET }} \
            --cache-control "public, max-age=0, must-revalidate" \
            --include "*.html" \
            --include "*.json" \
            --include "*.txt" \
            --include "*.xml"
      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CF_DISTRIBUTION_ID }} \
            --paths "/*"
      - name: Print deployment URL
        run: |
          echo "✅ Deployed to: https://${{ needs.terraform-apply.outputs.cloudfront_domain_name }}"
